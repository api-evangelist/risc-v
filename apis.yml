aid: risc-v
name: RISC-V International
description: >-
  RISC-V International advances the RISC-V open standard instruction set architecture, promoting open hardware development and reducing dependency on proprietary processor designs. It provides specifications, tools, and collaboration for building RISC-V based processors and systems.
